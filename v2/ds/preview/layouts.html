<!doctype html>
<html><head><meta charset="utf-8"><title>Layouts &amp; Backgrounds</title>
<link rel="stylesheet" href="../onewell.css">
<style>body{margin:0;padding:24px;background:var(--gray-50);width:700px;box-sizing:border-box;font-family:var(--font-body)}
.label{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.layout{display:flex;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;height:200px}
.left{width:140px;background:var(--cyan-50);border-right:1px solid var(--blue-200);padding:14px}
.center{flex:1;background:#fff;padding:14px}
.right{width:140px;background:var(--cyan-50);border-left:1px solid var(--blue-200);padding:14px}
.section-label{font-size:10px;font-weight:600;color:var(--cyan-800);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.nav-item{height:32px;display:flex;align-items:center;padding:0 8px;font-size:13px;color:var(--gray-700);border-radius:4px}
.nav-item.active{color:var(--cyan-700);font-weight:600;border-left:2px solid var(--cyan-700);padding-left:6px}
.dot{width:6px;height:6px;border-radius:9999px;background:var(--gray-300);margin-right:8px}
.dot.cyan{background:var(--cyan-700)}
.cn-card{background:#FBFDFA;border:1px solid var(--blue-200);border-radius:6px;padding:8px;font-size:12px;color:var(--gray-700);margin-bottom:6px}
</style></head><body>
<div class="label">Three-column layout · 280 / flex / 320</div>
<div class="layout">
<div class="left">
<div class="section-label">Concepts</div>
<div class="nav-item active"><span class="dot cyan"></span>Air</div>
<div class="nav-item"><span class="dot"></span>Water</div>
<div class="nav-item"><span class="dot"></span>Nourishment</div>
<div class="nav-item"><span class="dot"></span>Light</div>
</div>
<div class="center">
<div class="section-label" style="color:var(--cyan-800)">Strategy</div>
<div style="font-family:var(--font-display);font-size:20px;color:var(--gray-800);margin-bottom:8px">A1 — Air Quality</div>
<div style="font-size:13px;color:var(--gray-700);line-height:1.5">Establish minimum thresholds for indoor air quality through verified measurements of particulate matter and volatile organic compounds.</div>
</div>
<div class="right">
<div class="section-label">Attributes</div>
<div class="cn-card"><b>Tier</b><br>Core</div>
<div class="cn-card"><b>Points</b><br>3 max</div>
<div class="cn-card"><b>Updated</b><br>Apr 2026</div>
</div>
</div>
</body></html>
