<!doctype html>
<html><head><meta charset="utf-8"><title>Utility Buttons</title>
<link rel="stylesheet" href="../onewell.css">
<style>body{margin:0;padding:24px;background:var(--gray-50);width:700px;box-sizing:border-box;font-family:var(--font-body)}
.row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.label{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;width:120px}
button{font-family:var(--font-body);font-weight:600;border:0;cursor:pointer;height:32px;font-size:14px;border-radius:9999px;padding:0 16px}
.tab{border-radius:6px;font-weight:500}
.dark-row{background:var(--gray-700);padding:10px;border-radius:8px}
.dark-row .label{color:var(--gray-300)}
</style></head><body>
<div class="row"><span class="label">Utility · light</span>
<button style="background:var(--blue-600);color:#fff">Primary</button>
<button style="background:#fff;border:1px solid var(--blue-200);color:var(--blue-600)">Secondary</button>
<button style="background:#fff;border:1px solid var(--gray-200);color:var(--gray-600)">Tertiary</button>
</div>
<div class="row dark-row"><span class="label">On dark</span>
<button style="background:var(--cyan-300);color:#fff">Primary</button>
<button style="background:var(--gray-500);color:#fff">Secondary</button>
</div>
<div class="row"><span class="label">Tabs</span>
<button class="tab" style="background:var(--cyan-700);color:#fff">Active</button>
<button class="tab" style="background:var(--blue-100);color:var(--blue-700)">Inactive</button>
<button class="tab" style="background:var(--blue-100);color:var(--blue-700)">Inactive</button>
</div>
<div class="row"><span class="label">Destructive</span>
<button style="background:var(--coral-700);color:#fff">Delete</button>
<button style="background:var(--coral-800);color:#fff">Hover</button>
<button style="background:#F4A594;color:#fff;cursor:not-allowed" disabled>Disabled</button>
</div>
<div class="row"><span class="label">Toggle</span>
<button style="background:var(--cyan-700);color:#fff">On</button>
<button style="background:#fff;border:1px solid var(--gray-200);color:var(--gray-600)">Off</button>
<button style="background:#6FC4D6;color:#fff" disabled>Disabled</button>
</div>
</body></html>
