<!doctype html>
<html><head><meta charset="utf-8"><title>Cards &amp; Accordions</title>
<link rel="stylesheet" href="../onewell.css">
<style>body{margin:0;padding:24px;background:var(--gray-50);width:700px;box-sizing:border-box;font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:8px;padding:24px;box-shadow:var(--shadow-sm)}
.card-title{font-family:var(--font-display);font-size:18px;color:var(--gray-800);margin-bottom:12px}
.card-body{font-size:14px;color:var(--gray-700);line-height:1.5}
.add{background:transparent;border:1px dashed var(--blue-600);opacity:.7;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--blue-600);padding:32px}
.add .plus{font-size:24px;margin-bottom:6px}
.acc{background:var(--cyan-50);border:1px solid var(--blue-200);border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.acc .t{color:var(--blue-600);font-weight:500;font-size:16px}
.acc-open{background:#fff;border:2px solid var(--cyan-300);border-radius:8px;padding:14px 16px}
.acc-open .h{display:flex;align-items:center;justify-content:space-between;color:var(--blue-600);font-weight:500;font-size:16px}
.acc-open .body{font-size:14px;color:var(--gray-700);margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100)}
</style></head><body>
<div class="grid">
  <div class="card"><div class="card-title">Project overview</div><div class="card-body">A summary of your registered project, key milestones, and the strategies currently in play.</div></div>
  <div class="card add"><div class="plus">＋</div><div>Add a project</div></div>
</div>
<div style="height:14px"></div>
<div class="acc"><span class="t">C8 — Materials</span><span style="color:var(--gray-500)">▾</span></div>
<div class="acc-open"><div class="h"><span>C9 — Mind</span><span style="color:var(--gray-500);transform:rotate(180deg)">▾</span></div><div class="body">Strategies that promote mental health, restoration, and emotional well-being. Open state — 2px Cyan 300 border.</div></div>
</body></html>
