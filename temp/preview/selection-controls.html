<!doctype html>
<html><head><meta charset="utf-8"><title>Selection Controls</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;width:700px;box-sizing:border-box;font-family:var(--font-body)}
.row{display:flex;align-items:center;gap:24px;margin-bottom:16px;flex-wrap:wrap}
.label{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;width:80px}
.cb{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--gray-200);background:#fff}
.cb.on{background:var(--cyan-700);border-color:var(--cyan-700)}
.cb.disabled{background:var(--gray-50);border-color:var(--gray-100)}
.cb.dis-on{background:#6FC4D6;border-color:#6FC4D6}
.r{width:20px;height:20px;border-radius:9999px;border:1px solid var(--gray-200);background:#fff;display:inline-flex;align-items:center;justify-content:center}
.r.on{border:1px solid var(--cyan-700)}
.r.on::after{content:"";width:10px;height:10px;border-radius:9999px;background:var(--cyan-700)}
.seg{display:inline-flex;border:1px solid var(--gray-100);border-radius:9999px;padding:3px;background:#fff;gap:0}
.seg button{height:30px;padding:0 16px;border:0;background:transparent;font:500 14px var(--font-body);color:var(--gray-600);border-radius:9999px;cursor:pointer}
.seg button.on{background:var(--cyan-700);color:#fff}
.it{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--gray-800)}
</style></head><body>
<div class="row"><div class="label">Checkbox</div>
<span class="it"><span class="cb"></span>Off</span>
<span class="it"><span class="cb on"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="m2 6 3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>On</span>
<span class="it"><span class="cb disabled"></span>Disabled</span>
<span class="it"><span class="cb dis-on"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="m2 6 3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>On + Disabled</span>
</div>
<div class="row"><div class="label">Radio</div>
<span class="it"><span class="r"></span>Off</span>
<span class="it"><span class="r on"></span>Selected</span>
<span class="it"><span class="r" style="background:var(--gray-50);border-color:var(--gray-100)"></span>Disabled</span>
</div>
<div class="row"><div class="label">Segmented</div>
<div class="seg"><button class="on">All</button><button>Pursued</button><button>Achieved</button></div>
</div>
<div class="row"><div class="label">Switch</div>
<div class="seg"><button class="on">Yes</button><button>No</button></div>
<div class="seg"><button>Day</button><button class="on">Month</button><button>Year</button></div>
</div>
</body></html>
