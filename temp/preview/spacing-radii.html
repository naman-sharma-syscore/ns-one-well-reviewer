<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing &amp; Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;width:700px;box-sizing:border-box;font-family:var(--font-body)}
.section{margin-bottom:18px}
.label{font-size:11px;font-weight:600;color:var(--gray-600);letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.row{display:flex;align-items:flex-end;gap:12px}
.bar{background:var(--cyan-100);border:1px solid var(--cyan-200);height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--cyan-800);font-weight:600}
.r{display:flex;flex-direction:column;align-items:center;gap:6px}
.r .b{width:64px;height:64px;background:var(--cyan-700)}
.r .l{font-size:11px;color:var(--gray-700);font-weight:500}
.r .v{font-size:10px;color:var(--gray-500);font-family:ui-monospace,monospace}
</style></head><body>
<div class="section">
  <div class="label">Spacing scale (4 / 8 / 16 / 32 / 64)</div>
  <div class="row">
    <div class="bar" style="width:4px"></div>
    <div class="bar" style="width:8px"></div>
    <div class="bar" style="width:16px">16</div>
    <div class="bar" style="width:32px">32</div>
    <div class="bar" style="width:64px">64</div>
    <div class="bar" style="width:128px;background:var(--gray-50);border-color:var(--gray-200);color:var(--gray-600)">128 (composed)</div>
  </div>
</div>
<div class="section">
  <div class="label">Border radii</div>
  <div class="row">
    <div class="r"><div class="b" style="border-radius:4px"></div><div class="l">sm</div><div class="v">4px</div></div>
    <div class="r"><div class="b" style="border-radius:6px"></div><div class="l">md</div><div class="v">6px · default</div></div>
    <div class="r"><div class="b" style="border-radius:8px"></div><div class="l">lg</div><div class="v">8px · cards/inputs</div></div>
    <div class="r"><div class="b" style="border-radius:16px"></div><div class="l">xl</div><div class="v">16px</div></div>
    <div class="r"><div class="b" style="border-radius:9999px"></div><div class="l">full</div><div class="v">pill / CTA</div></div>
  </div>
</div>
</body></html>
