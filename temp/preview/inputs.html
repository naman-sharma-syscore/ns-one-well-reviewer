<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;width:700px;box-sizing:border-box;font-family:var(--font-body)}
.label{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin:0 0 6px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column}
.input{height:40px;padding:0 12px;border:1px solid var(--gray-200);border-radius:8px;font:14px var(--font-body);color:var(--gray-800);background:#fff;outline:none;width:100%;box-sizing:border-box}
.input::placeholder{color:var(--gray-400)}
.input.focus{border:2px solid var(--cyan-300);box-shadow:0 0 0 2px rgba(57,201,234,.2);padding:0 11px}
.input.error{border:2px solid var(--coral-700);padding:0 11px}
.input.disabled{background:var(--gray-50);border-color:var(--gray-100);color:var(--gray-400);cursor:not-allowed}
.err{font-size:12px;color:var(--coral-700);margin-top:4px}
.search{position:relative}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.search .input{padding-left:36px}
</style></head><body>
<div class="row">
<div class="field"><div class="label">Default</div><input class="input" placeholder="Enter project name"></div>
<div class="field"><div class="label">Focus</div><input class="input focus" value="123 Madison Ave"></div>
</div>
<div class="row">
<div class="field"><div class="label">Disabled</div><input class="input disabled" value="Read only" disabled></div>
<div class="field"><div class="label">Error</div><input class="input error" value="invalid@"><div class="err">Enter a valid email address</div></div>
</div>
<div class="row">
<div class="field"><div class="label">Search</div><div class="search"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="m11 11 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><input class="input" placeholder="Search..."></div></div>
<div class="field"><div class="label">Select</div><div style="position:relative"><input class="input" value="Health-Safety" readonly><svg style="position:absolute;right:12px;top:50%;transform:translateY(-50%)" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="m4 6 4 4 4-4" stroke="#9FA2AB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
</div>
</body></html>
