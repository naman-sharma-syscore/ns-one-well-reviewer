<!doctype html>
<html><head><meta charset="utf-8"><title>Table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gray-50);width:700px;box-sizing:border-box;font-family:var(--font-body)}
table{width:100%;background:#fff;border:1px solid var(--gray-200);border-radius:8px;border-collapse:separate;border-spacing:0;overflow:hidden}
th{background:var(--cyan-50);font-size:12px;font-weight:600;text-transform:uppercase;color:var(--cyan-800);text-align:left;letter-spacing:.05em;padding:14px 16px;border-bottom:1px solid var(--gray-200)}
td{font-size:14px;color:var(--gray-800);padding:14px 16px;border-bottom:1px solid var(--gray-200)}
tr:last-child td{border-bottom:0}
tr:nth-child(even) td{background:var(--gray-50)}
.tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:9999px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
</style></head><body>
<table>
<thead><tr><th>Strategy</th><th>Concept</th><th>Status</th><th>Pts</th></tr></thead>
<tbody>
<tr><td>A1.1 Particulate Matter</td><td>Air</td><td><span class="tag" style="background:var(--emerald-100);color:var(--emerald-600)">Done</span></td><td>3</td></tr>
<tr><td>W1.2 Water Quality Indicators</td><td>Water</td><td><span class="tag" style="background:var(--coral-100);color:var(--coral-600)">High</span></td><td>2</td></tr>
<tr><td>N4.1 Mindful Eating</td><td>Nourishment</td><td><span class="tag" style="background:var(--plum-100);color:var(--plum-600)">Medium</span></td><td>1</td></tr>
<tr><td>L3.2 Circadian Lighting</td><td>Light</td><td><span class="tag" style="background:var(--gray-100);color:var(--gray-600)">To-Do</span></td><td>—</td></tr>
<tr><td>M2.1 Active Furnishings</td><td>Movement</td><td><span class="tag" style="background:var(--cyan-100);color:var(--cyan-600)">Low</span></td><td>2</td></tr>
</tbody>
</table>
</body></html>
