<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1440, initial-scale=1">
  <title>OneWELL Reviewer · Review queue</title>

  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="components.css">

  <style>
    html, body { margin: 0; padding: 0; background: var(--gray-50); }
    body { font-family: var(--font-body); color: var(--gray-800); min-width: 1280px; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>

  <!-- React + Babel (pinned, integrity-checked) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <!-- =========================================================================
       PAGE: Review queue (the dashboard).  This is the home page.
       Scripts load top-to-bottom; the order matters:
         1. page-router.js        → cross-page navigation (plain JS)
         2. reviewer-data.js       → the sample data (window.ReviewerData)
         3. reviewer-shell.jsx     → the sidebar + top bar frame (AppFrame)
         4. reviewer-dashboard.jsx → the Dashboard screen itself
         5. page-dashboard.jsx     → puts the screen on the page
       ========================================================================= -->
  <div id="root"></div>

  <script src="src/page-router.js"></script>
  <script src="src/reviewer-data.js"></script>
  <script type="text/babel" data-presets="react" src="src/reviewer-shell.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/reviewer-dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/page-dashboard.jsx"></script>
</body>
</html>
