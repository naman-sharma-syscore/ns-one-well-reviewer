<body>
  <div id="root"></div>

  <!-- Data engine (plain JS, defines window.ReviewerData) -->

  <!-- Component layers, in dependency order: shell defines AppFrame + helpers, -->
  <!-- views export themselves to window, app harness mounts the router.        -->

  <script type="text/babel" data-presets="react" src="src/reviewer-dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/isolated-task-view.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/reviewer-ops.jsx"></script>
